<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>m-clock Student — Setup</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; background: #0c1b38; color: #f4f0e6; padding: 22px; }
  h1 { color: #c89b3c; font-size: 19px; margin: 0 0 4px; }
  p { color: rgba(244,240,230,.7); font-size: 13px; margin: 0 0 18px; }
  label { display: block; font-size: 12px; color: rgba(244,240,230,.7); margin: 14px 0 5px; font-weight: 600; }
  input, select { width: 100%; box-sizing: border-box; background: #18335f; border: 1px solid rgba(244,240,230,.2); color: #f4f0e6; border-radius: 9px; padding: 11px; font-size: 14px; }
  button { width: 100%; margin-top: 20px; background: #c89b3c; color: #112549; border: none; border-radius: 9px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .hint { font-size: 12px; color: rgba(244,240,230,.5); margin-top: 8px; }
  .err { color: #ffb4a8; font-size: 13px; margin-top: 10px; min-height: 16px; }
</style>
</head>
<body>
  <h1>🕌 m-clock Student — Setup</h1>
  <p>Enter the address your school gave you, and choose who you are.</p>

  <label>Server address</label>
  <input id="serverUrl" type="text" placeholder="http://192.168.1.50:3000" />
  <div class="hint">Example on the school network: <b>http://192.168.1.50:3000</b></div>

  <label>I am a…</label>
  <select id="group">
    <option value="fulltime">🎓 Full-time student</option>
    <option value="parttime">🕑 Part-time student</option>
    <option value="teacher">🧑‍🏫 Teacher</option>
    <option value="all">🖥️ Show me everything</option>
  </select>

  <button id="save">Connect</button>
  <div class="err" id="err"></div>

  <script>
    (async () => {
      const cfg = await window.mclock.getConfig();
      if (cfg.serverUrl) document.getElementById('serverUrl').value = cfg.serverUrl;
      if (cfg.group) document.getElementById('group').value = cfg.group;
    })();

    document.getElementById('save').addEventListener('click', async () => {
      let url = document.getElementById('serverUrl').value.trim();
      const group = document.getElementById('group').value;
      if (!url) { document.getElementById('err').textContent = 'Please enter the server address.'; return; }
      if (!/^https?:\/\//i.test(url)) url = 'http://' + url; // be forgiving
      await window.mclock.saveConfig({ serverUrl: url, group });
    });
  </script>
</body>
</html>
